server:
  port: 8082 # Analyzer Port (수집기는 8081)

spring:
  application:
    name: onol-analyzer

  datasource:
    url: jdbc:postgresql://localhost:5432/onol_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa: # JPA를 안 쓰더라도 Hibernate/JDBC 설정에 영향을 줄 수 있음
    properties:
      hibernate:
        jdbc:
          batch_size: 5000
          order_inserts: true

  cloud:
    function:
      definition: processPacket

    stream:
      kafka:
        binder:
          brokers: localhost:9092
          configuration:
            # 컨슈머 튜닝 (Fetch 튜닝)
            max.poll.records: 5000 # 한 번에 5000개씩 가져옴 (기존 500 -> 10배)
            fetch.min.bytes: 1048576 # 최소 1MB 쌓일 때까지 기다렸다 가져옴 (CPU 절약)
            fetch.max.wait.ms: 500 # 데이터가 적으면 0.5초 기다림
        bindings:
          processPacket-in-0:
            consumer:
              # 평소에는 읽던 곳부터 읽지만, 오프셋 정보가 없을 땐 가장 과거 데이터부터 가져와서 '데이터 유실'을 막음
              auto-offset-reset: earliest

      bindings:
        processPacket-in-0: # 코드의 Consumer 함수 이름 (processPacket)과 매핑됨
          destination: raw-packet-topic
          group: analyzer-group # Consumer Group (스케일 아웃 및 offset 관리)
          consumer:
            batch-mode: true # 하나씩 말고 뭉텅이로 받음 (성능 최적화)
            max-attempts: 3

        # 실패한 메시지를 보낼 출구(DLQ) 정의
        sendToDlq-out-0:
          destination: packet-dlq-topic # Kafka에 이 토픽이 자동 생성됨